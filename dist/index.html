  <style>
    /* Hero 3D logo animations — inlined for reliability */
    @keyframes heroSpinY { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
    @keyframes heroSpinX { 0% { transform: rotateX(0deg); } 100% { transform: rotateX(360deg); } }
    @keyframes heroSpinXY {
      0%   { transform: rotateY(0deg) rotateX(0deg); }
      50%  { transform: rotateY(180deg) rotateX(25deg); }
      100% { transform: rotateY(360deg) rotateX(0deg); }
    }
    @keyframes heroTwinkle { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    @keyframes heroSweep { to { transform: rotate(360deg); } }
  </style>
